<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Me</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font (lebih modern look) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<style>
    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #0f172a, #111827);
        color: #e5e7eb;
        min-height: 100vh;
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1, h3 {
        font-weight: 700;
    }

    .badge-skill {
        background: rgba(59,130,246,0.15);
        border: 1px solid rgba(59,130,246,0.4);
        color: #93c5fd;
        margin: 5px;
        padding: 8px 12px;
        border-radius: 20px;
        display: inline-block;
    }

    .btn-custom {
        background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        border: none;
        padding: 10px 20px;
        border-radius: 10px;
        color: white;
        transition: 0.3s;
    }

    .btn-custom:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(59,130,246,0.3);
    }
</style>

</head>

<body>

<div class="container py-5">

    <div class="glass-card">

        <h1 class="mb-3">About Me</h1>

        <p class="mb-4">
            I am a Computer Science student passionate about building modern web applications,
            exploring data analytics, and continuously improving my development skills.
        </p>

        <h3 class="mb-3">Skills</h3>

        <div class="mb-4">
            <span class="badge-skill">HTML</span>
            <span class="badge-skill">CSS</span>
            <span class="badge-skill">JavaScript</span>
            <span class="badge-skill">Bootstrap</span>
            <span class="badge-skill">Power BI</span>
            <span class="badge-skill">Python</span>
            <span class="badge-skill">SQL</span>
        </div>

        <a href="index.html" class="btn btn-custom">← Back Home</a>

    </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
