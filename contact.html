<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Shahrul Imran</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>

body{
    font-family:'Inter',sans-serif;
}

/* HERO */
.contact-hero{
    padding:80px 0 40px;
    text-align:center;
}

.contact-hero h1{
    font-size:3rem;
    font-weight:800;
}

/* GLASS CARD */
.glass-card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:30px;
}

/* FORM */
.form-control{
    border-radius:12px;
    padding:14px;
}

textarea{
    resize:none;
}

.btn-send{
    padding:12px 25px;
    border-radius:12px;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
<div class="container">

<a class="navbar-brand" href="index.html">
Shahrul Imran
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">

<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
<li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
<li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
</ul>

<button class="btn-theme ms-3" onclick="toggleDarkMode()">🌙</button>

</div>

</div>
</nav>

<!-- HERO -->
<section class="contact-hero">
<div class="container">
<h1>Get In Touch</h1>
<p class="lead">Let's discuss opportunities, projects and collaborations.</p>
</div>
</section>

<!-- CONTACT FORM CENTER -->
<section class="pb-5">
<div class="container">

<div class="row justify-content-center">

<div class="col-lg-7">

<div class="glass-card">

<h2 class="mb-4 text-center">Contact Me</h2>

<p class="mb-4 text-center">
Feel free to send me a message regarding internships, freelance work, collaborations or any exciting opportunities.
</p>

<form>

<div class="row">
<div class="col-md-6 mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" placeholder="Enter your name">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Email Address</label>
<input type="email" class="form-control" placeholder="Enter your email">
</div>
</div>

<div class="mb-3">
<label class="form-label">Subject</label>
<input type="text" class="form-control" placeholder="Subject">
</div>

<div class="mb-3">
<label class="form-label">Message</label>
<textarea rows="7" class="form-control" placeholder="Write your message here..."></textarea>
</div>

<div class="text-center">
<button type="submit" class="btn btn-primary btn-send">
Send Message
</button>
</div>

</form>

</div>

</div>

</div>

</div>
</section>

<footer class="text-center p-4">
© 2026 Shahrul Imran. All Rights Reserved.
</footer>

<script src="js/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
